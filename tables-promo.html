<!DOCTYPE html>
<html>
<head>
    <title>Latihan Table Promo</title>
    <style>
        /* CSS simpel untuk mewarnai garis tabel jadi merah */
        table {
            border: 2px solid red;
            border-collapse: collapse;
            width: 200px;
            display: inline-table; /* Agar tabel bisa berjajar ke samping */
            margin: 10px;
        }
        
        td {
            border: 2px solid red;
            padding: 15px;
            text-align: center;
        }

        /* Supaya daftar makanan rata kiri */
        .isi-menu {
            text-align: left;
        }
    </style>
</head>
<body>

    <center>
        <table>
            <tr>
                <td><b>Promo 1</b></td>
            </tr>
            <tr>
                <td class="isi-menu">
                    2 Fried Chicken <br>
                    2 Cola <br>
                    1 Rice
                </td>
            </tr>
            <tr>
                <td><b>IDR. 55.000,-</b></td>
            </tr>
        </table>

        <table>
            <tr>
                <td><b>Promo 2</b></td>
            </tr>
            <tr>
                <td class="isi-menu">
                    4 Fried Chicken <br>
                    2 Cola <br>
                    2 Rice
                </td>
            </tr>
            <tr>
                <td><b>IDR. 80.000,-</b></td>
            </tr>
        </table>

        <table>
            <tr>
                <td><b>Promo 3</b></td>
            </tr>
            <tr>
                <td class="isi-menu">
                    8 Fried Chicken <br>
                    4 Cola <br>
                    4 Rice
                </td>
            </tr>
            <tr>
                <td><b>IDR. 120.000,-</b></td>
            </tr>
        </table>
    </center>

</body>
</html>
